services:
  postgres:
    image: postgres:16
    container_name: agentfarm-postgres
    environment:
      POSTGRES_USER: agentfarm
      POSTGRES_PASSWORD: agentfarm
      POSTGRES_DB: agentfarm
    ports:
      - '5432:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U agentfarm' ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: agentfarm-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:0.68.0-static
    container_name: agentfarm-opa
    command: [ 'run', '--server', '--addr', '0.0.0.0:8181' ]
    ports:
      - '8181:8181'
