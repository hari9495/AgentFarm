services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: agentfarm_test
      POSTGRES_PASSWORD: agentfarm_test
      POSTGRES_DB: agentfarm_test
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agentfarm_test" ]
      interval: 5s
      timeout: 5s
      retries: 10
